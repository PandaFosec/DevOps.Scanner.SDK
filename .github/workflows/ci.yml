name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Installs the toolchain pinned in mise.toml (python + uv).
      - uses: jdx/mise-action@v2

      - name: Verify uv.lock is in sync with pyproject.toml
        run: uv lock --check

      - name: Install dependencies (locked)
        run: uv sync --frozen --python "$(mise which python)"

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: uv run --python "$(mise which python)" pytest -q
