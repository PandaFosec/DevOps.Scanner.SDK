name: tests

# Run pytest on push to master + PRs via the repo's mise toolchain (python + uv).
# Self-contained (no cross-repo deps) — this is the shared contract everything
# else depends on.
on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: mise exec -- uv run pytest -q
