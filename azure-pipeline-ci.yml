# CI Pipeline — parity with the GitHub Actions ci.yml
#   (uv.lock check + ruff lint/format + pytest where a suite exists).

name: python_ci-$(Date:yyyyMMdd)$(rev:.r)

trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

pool:
  vmImage: ubuntu-latest

jobs:
  - job: ci
    displayName: ci
    steps:
      - checkout: self

      - bash: |
          set -euo pipefail

          curl -fsSL https://mise.run | sh
          export PATH="$HOME/.local/bin:$PATH"

          mise trust
          mise install

          mise exec -- uv lock --check
          mise exec -- uv sync --frozen
          mise exec -- uv run ruff check .
          mise exec -- uv run ruff format --check .
          mise exec -- uv run pytest -q
        displayName: Lint and test (mise + uv)
